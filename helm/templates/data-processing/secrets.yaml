{{- $secrets := dict }}
{{- range $k, $v := .Values.dataProcessing.secrets }}
{{- if $v }}{{- $_ := set $secrets $k $v }}{{- end }}
{{- end }}
{{- if $secrets }}
kind: Secret
apiVersion: v1
metadata:
  name: {{ template "cpaor-data-viz-dashboard-helm.fullname" . }}-data-processing-secrets
  labels:
    app: {{ template "cpaor-data-viz-dashboard-helm.fullname" . }}
    component: data-processing
    environment: {{ .Values.environment }}
    release: {{ .Release.Name }}
type: Opaque
stringData:
  {{- range $k, $v := $secrets }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
{{- end }}
