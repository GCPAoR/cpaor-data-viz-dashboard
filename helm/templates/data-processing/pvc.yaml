apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ template "cpaor-data-viz-dashboard-helm.fullname" . }}-shared-volume
  labels:
    environment: {{ .Values.environment }}
    release: {{ .Release.Name }}
spec:
  accessModes:
    {{- toYaml (.Values.sharedVolume.persistence.accessModes | required "sharedVolume.persistence.accessModes is required, e.g. [ReadWriteOnce] for local-path or [ReadWriteMany] for longhorn") | nindent 4 }}
  storageClassName: {{ .Values.sharedVolume.persistence.storageClassName }}
  resources:
    requests:
      storage: {{ .Values.sharedVolume.persistence.size }}
