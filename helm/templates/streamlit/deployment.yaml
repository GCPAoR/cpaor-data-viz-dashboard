{{- if .Values.streamlit.enabled }}

apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ template "cpaor-data-viz-dashboard-helm.fullname" . }}-streamlit
  labels:
    app: {{ template "cpaor-data-viz-dashboard-helm.fullname" . }}
    component: streamlit
    environment: {{ .Values.environment }}
    release: {{ .Release.Name }}
spec:
  replicas: {{ .Values.streamlit.replicaCount }}
  {{- with .Values.streamlit.strategy }}
  strategy:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  selector:
    matchLabels:
      app: {{ template "cpaor-data-viz-dashboard-helm.fullname" . }}
      run: streamlit
  template:
    metadata:
      labels:
        app: {{ template "cpaor-data-viz-dashboard-helm.fullname" . }}
        run: streamlit
    spec:
      containers:
        - name: streamlit
          image: "{{ .Values.streamlit.image.name }}:{{ .Values.streamlit.image.tag }}"
          imagePullPolicy: {{ .Values.streamlit.image.pullPolicy }}
          command: ["streamlit", "run", "/app/app.py", "--server.address", "0.0.0.0"]
          ports:
            - name: http
              containerPort: {{ .Values.streamlit.containerPort }}
              protocol: TCP
          livenessProbe:
            {{- toYaml .Values.streamlit.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.streamlit.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.streamlit.resources | nindent 12 }}
          env:
            - name: STREAMLIT_SERVER_ADDRESS
              value: "0.0.0.0"
            - name: STREAMLIT_SERVER_PORT
              value: {{ .Values.streamlit.containerPort | quote }}
            {{- include "cpaor-data-viz-dashboard-helm.workloadEnv" (dict "configName" (printf "%s-config" (include "cpaor-data-viz-dashboard-helm.fullname" .)) "workload" .Values.streamlit) | trim | nindent 12 }}
          {{- $envFrom := include "cpaor-data-viz-dashboard-helm.workloadEnvFrom" (dict "secretName" (printf "%s-streamlit-secrets" (include "cpaor-data-viz-dashboard-helm.fullname" .)) "workload" .Values.streamlit) }}
          {{- if trim $envFrom }}
          envFrom:
            {{- $envFrom | trim | nindent 12 }}
          {{- end }}
          volumeMounts:
          - mountPath: "/data"
            name: shared-volume
      volumes:
        - name: shared-volume
          persistentVolumeClaim:
            claimName: {{ template "cpaor-data-viz-dashboard-helm.fullname" . }}-shared-volume

{{- end }}
