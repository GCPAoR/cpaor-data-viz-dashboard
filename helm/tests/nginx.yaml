environment: staging

ingress:
  className: nginx
  streamlit:
    host: cpaor.example.com

streamlit:
  image:
    name: ghcr.io/cpaor/streamlit
    tag: v1.0.1
    pullPolicy: IfNotPresent
  env:
    GA_TRACKING_ID: TRACKING_ID
  secrets:
    STREAMLIT_USER_PASSWORD: FAKE_USER_PASSWORD

sharedVolume:
  persistence:
    storageClassName: longhorn
    size: "1Gi"

dataProcessing:
  image:
    name: ghcr.io/cpaor/data-processing
    tag: v1.0.1
  secrets:
    OPENAI_API_KEY: FAKE_OPENAI_API_KEY
    CPAOR_EMAIL: FAKE_CPAOR@EMAIL.COM
    ACAPS_PASSWORD: FAKE_ACAPS_PASSWORD
    ACLED_USERNAME: FAKE_ACLED_USERNAME
    ACLED_PASSWORD: FAKE_ACLED_PASSWORD
